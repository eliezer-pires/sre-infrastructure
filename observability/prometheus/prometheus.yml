# Configuração de exemplo do Prometheus (sanitizada).
# Ambiente air-gapped: todos os alvos são internos.
global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    ambiente: producao
    site: on-premises

rule_files:
  - alerts/proxmox-alerts.yml

# Alertmanager interno (exemplo)
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["10.0.10.40:9093"]

scrape_configs:
  - job_name: "node"
    static_configs:
      - targets:
          - "10.0.10.5:9100"   # prd-fs-01
          - "10.0.10.40:9100"  # prd-monitor-01
          - "10.0.10.43:9100"  # prd-gitlab-01

  - job_name: "proxmox"
    static_configs:
      - targets: ["10.0.0.1:9221", "10.0.0.2:9221", "10.0.0.3:9221"]  # pve_exporter por node

  - job_name: "cadvisor"
    static_configs:
      - targets: ["10.0.10.43:8080"]  # hosts Docker

  - job_name: "blackbox"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - "https://nextcloud.intranet.local"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "10.0.10.40:9115"  # blackbox_exporter
